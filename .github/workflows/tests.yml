# This workflow will install Python dependencies, run tests and lint with a variety of Python versions
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-python-with-github-actions

name: tests

on:
  push:
    paths: ['.github/workflows/tests.yml', 'dsigma/**', 'tests/**', 'pyproject.toml']
  pull_request:
    paths: ['.github/workflows/tests.yml', 'dsigma/**', 'tests/**', 'pyproject.toml']
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:

jobs:
  tests:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']
    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v6
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install ruff pytest pytest-cov treecorr camb
    - name: Lint with ruff
      run: |
        ruff check dsigma
        ruff check --exit-zero --select ALL  --ignore Q,ANN,FBT002 dsigma
    - name: Test with pytest
      run: |
        python -m pip install -e .
        python -m pytest --cov=dsigma --durations=0 --cov-report lcov
    - name: Coveralls
      if: ${{ success() && ( matrix.python-version == '3.14' ) && ( matrix.os == 'ubuntu-latest' ) }}
      uses: coverallsapp/github-action@v2
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        path-to-lcov: coverage.lcov

