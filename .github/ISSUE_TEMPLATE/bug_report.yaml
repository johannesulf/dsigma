name: Bug Report
description: File a bug report.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Please describe the problem you encountered with ``dsigma``.
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      multiple: true
      description: What version(s) of ``dsigma`` show this problem?
      placeholder: version 1.1.0, commit e49a02f etc.
